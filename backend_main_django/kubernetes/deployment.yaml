apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app
  labels:
    app: django
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
        environment: production
    spec:
      containers:
      - name: django
        image: django_app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        env:
        - name: DEBUG
          value: "False"
        envFrom:
        - secretRef:
            name: django-secrets